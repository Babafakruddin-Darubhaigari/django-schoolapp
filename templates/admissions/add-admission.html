{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>add-admissions page</title>
    <link rel="stylesheet" href="{% static 'stylesheets/styles.css' %}" type="text/css">
</head>
<body>
    <h1>add-admissions page</h1>

    <table border="1px">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Grade</th>
        </tr>
        {% for student in allStudents %}
        <tr>
            <td>{{ student.name }}</td>
            <td>{{ student.age }}</td>
            <td>{{ student.grade }}</td>
        </tr>
        {% endfor %}
    </table>

    
</body>
</html>
